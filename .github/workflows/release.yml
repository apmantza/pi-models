name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      should_release: ${{ steps.meta.outputs.should_release }}
      has_npm_token: ${{ steps.meta.outputs.has_npm_token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: meta
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"

          # Release if the version tag doesn't exist yet. The tag check is the
          # sole guard — no need to also require package.json in the diff, which
          # breaks when the version bump and changelog land in separate commits.
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            SHOULD_RELEASE=false
          else
            SHOULD_RELEASE=true
          fi

          # Check if NPM_TOKEN secret is configured
          if [ -n "$NPM_TOKEN" ]; then
            HAS_NPM_TOKEN=true
          else
            HAS_NPM_TOKEN=false
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "has_npm_token=$HAS_NPM_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Verify changelog entry exists
        if: steps.meta.outputs.should_release == 'true'
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "Missing CHANGELOG entry for version $VERSION"
            exit 1
          fi

  release:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push tag
        shell: bash
        run: |
          git tag "${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Create GitHub release
        uses: "softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d"
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true

  publish-npm:
    runs-on: ubuntu-latest
    needs: [prepare, release]
    if: >-
      needs.prepare.outputs.should_release == 'true' &&
      needs.prepare.outputs.has_npm_token == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Dry-run publish (validates tarball + registry auth)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --dry-run

      - name: Verify required files in tarball
        shell: bash
        run: |
          TARBALL=$(ls pi-models-*.tgz)
          echo "Checking tarball: $TARBALL"
          tar -tzf "$TARBALL" | grep "package/pi-models.ts" || \
            (echo "ERROR: pi-models.ts missing from tarball" && exit 1)
          tar -tzf "$TARBALL" | grep "package/package.json" || \
            (echo "ERROR: package.json missing from tarball" && exit 1)
          echo "Tarball contents OK"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
