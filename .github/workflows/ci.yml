name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  sonarqube-scan:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    needs: [install-test]
    permissions:
      contents: read
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: SonarCloud Scan
        uses: "SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  install-test:
    name: Install test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Pack tarball
        run: npm pack

      - name: Verify required files in tarball
        shell: bash
        run: |
          TARBALL=$(ls *.tgz)
          echo "Checking tarball: $TARBALL"
          tar -tzf "$TARBALL" | grep "package.json" || \
            (echo "ERROR: package.json missing from tarball" && exit 1)

      - name: Install from tarball (simulates pi install npm:...)
        shell: bash
        run: |
          TARBALL=$(ls *.tgz)
          npm install -g "$TARBALL"
